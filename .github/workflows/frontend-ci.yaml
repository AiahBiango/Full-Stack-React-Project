name: Blog Frontend CI

on:  # Listen to events with the 'on' keyword
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:  # Job that will run linter and build the frontend
  lint-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    strategy:
      matrix:
        node-version: [20.x]  

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter on frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build